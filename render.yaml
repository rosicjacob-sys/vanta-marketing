# Render Blueprint for Vanta Marketing.
#
# One Node web service that serves the static site AND hosts the former Netlify
# Functions (see server.mjs), plus a daily cron job for subscription reminders
# (replaces the old Netlify Scheduled Function). The database stays on Neon -
# set its connection string as NETLIFY_DATABASE_URL (the code reads that name
# via @netlify/neon; no code change needed).
#
# Environment variables are NOT managed by this blueprint - set them directly
# on each service in the Render dashboard (Environment tab). Required:
#   ADMIN_EMAIL, ADMIN_PW_HASH (scrypt$<salt>$<hash>), SESSION_SECRET,
#   NETLIFY_DATABASE_URL (Neon), NETGRID_API_URL, NETGRID_API_KEY, RESEND_API_KEY
# Optional (have code defaults): EMAIL_FROM, URL, REMINDER_LEAD_DAYS

services:
  # Static site + serverless functions, served by one Node process.
  - type: web
    name: vanta-marketing
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /robots.txt
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"

  # Daily subscription reminder sweep (was the Netlify '@daily' scheduled fn).
  - type: cron
    name: vanta-reminders
    runtime: node
    plan: starter
    region: oregon
    branch: main
    schedule: "0 8 * * *"      # 08:00 UTC daily
    buildCommand: npm install
    startCommand: node scripts/run-reminders.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
